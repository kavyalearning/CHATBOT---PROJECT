<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
background:#6c63ff;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.chat-box{
height:350px;
padding:10px;
overflow-y:auto;
background:#f5f5f5;
}

.user-message{
text-align:right;
margin:10px;
}

.user-message span{
background:#6c63ff;
color:white;
padding:8px 12px;
border-radius:15px;
display:inline-block;
}

.bot-message{
text-align:left;
margin:10px;
}

.bot-message span{
background:#e4e6eb;
padding:8px 12px;
border-radius:15px;
display:inline-block;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
font-size:14px;
}

button{
background:#6c63ff;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

button:hover{
background:#574fd6;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
AI Chatbot
</div>

<div id="chatbox" class="chat-box"></div>

<div class="input-area">
<input id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function addMessage(message,type){

let chatbox=document.getElementById("chatbox")

let div=document.createElement("div")

div.className=type+"-message"

div.innerHTML="<span>"+message+"</span>"

chatbox.appendChild(div)

chatbox.scrollTop=chatbox.scrollHeight

}

function sendMessage(){

let input=document.getElementById("userInput")

let message=input.value

if(message=="") return

addMessage(message,"user")

input.value=""

fetch("/get_response",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(response=>response.json())
.then(data=>{
addMessage(data.response,"bot")
})

}

</script>

</body>
</html>
